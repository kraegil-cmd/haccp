<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HACCP Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 0 0 40px 0;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: 12px; opacity: 0.5; margin-top: 1px; }

  .container { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e8e4;
    padding: 18px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #888;
    margin-bottom: 14px;
  }

  #scanner-box {
    display: none;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    width: 100%;
    margin-bottom: 12px;
    background: #000;
  }

  #scanner-box #interactive { width: 100%; position: relative; }
  #scanner-box #interactive video { width: 100% !important; height: auto !important; display: block; }
  #scanner-box #interactive canvas { display: none; }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 75%;
    height: 80px;
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 6px;
  }

  .scan-line {
    position: absolute;
    width: 73%;
    height: 2px;
    background: #4ade80;
    animation: scanline 2s ease-in-out infinite;
  }

  @keyframes scanline {
    0%   { transform: translateY(-30px); }
    50%  { transform: translateY(30px); }
    100% { transform: translateY(-30px); }
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:active { transform: scale(0.98); opacity: 0.85; }
  .btn-scan   { background: #1a1a1a; color: #fff; }
  .btn-stop   { background: #e8e8e4; color: #1a1a1a; display: none; margin-top: 8px; }
  .btn-submit { background: #16a34a; color: #fff; display: none; margin-top: 8px; }
  .btn-clear  { background: #e8e8e4; color: #555; display: none; margin-top: 8px; }

  .barcode-result {
    display: none;
    background: #f4f4f0;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #555;
  }

  .barcode-result strong { color: #1a1a1a; font-size: 15px; display: block; margin-bottom: 2px; }

  .lookup-status {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
    display: none;
    align-items: center;
    gap: 6px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid #e8e8e4;
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    color: #1a1a1a;
    margin-bottom: 13px;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus, select:focus { outline: none; border-color: #1a1a1a; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .accepted-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid #f0f0ec;
    margin-top: 4px;
  }

  .accepted-label { font-size: 15px; color: #1a1a1a; }

  .toggle {
    width: 48px; height: 28px;
    background: #e8e8e4;
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }

  .toggle.on { background: #16a34a; }

  .toggle::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(20px); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s ease;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #16a34a; }
  .toast.error   { background: #dc2626; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <rect width="28" height="28" rx="7" fill="#fff" fill-opacity="0.15"/>
    <rect x="6" y="7" width="3" height="14" rx="1" fill="white"/>
    <rect x="11" y="7" width="1.5" height="14" rx="0.75" fill="white"/>
    <rect x="14" y="7" width="3" height="14" rx="1" fill="white"/>
    <rect x="19" y="7" width="1.5" height="14" rx="0.75" fill="white"/>
  </svg>
  <div>
    <h1>HACCP Log</h1>
    <p>Delivery intake scanner</p>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">Scan barcode</div>

    <div id="scanner-box">
      <div id="interactive" class="viewport"></div>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>

    <div class="barcode-result" id="barcode-result">
      <strong id="barcode-display"></strong>
      <span id="barcode-sub"></span>
    </div>

    <div class="lookup-status" id="lookup-status">
      <div class="spinner"></div>
      <span>Looking up product...</span>
    </div>

    <button class="btn btn-scan" id="btn-scan" onclick="startScan()">Scan barcode</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopScan()">Stop camera</button>
  </div>

  <div class="card" id="form-card" style="display:none">
    <div class="card-title">Product details</div>

    <label>Product name</label>
    <input type="text" id="f-name" placeholder="e.g. Sliced Ham">

    <label>Brand</label>
    <input type="text" id="f-brand" placeholder="e.g. Campofrio">

    <label>Category</label>
    <select id="f-category">
      <option value="">Select category</option>
      <option>Meat</option>
      <option>Fish &amp; Seafood</option>
      <option>Dairy</option>
      <option>Produce</option>
      <option>Frozen</option>
      <option>Dry goods</option>
      <option>Beverages</option>
      <option>Other</option>
    </select>

    <label>Lot number</label>
    <input type="text" id="f-lot" placeholder="e.g. L240419">

    <label>Expiry date</label>
    <input type="date" id="f-expiry">

    <div class="row">
      <div>
        <label>Quantity</label>
        <input type="number" id="f-qty" placeholder="e.g. 5" min="0" step="0.1">
      </div>
      <div>
        <label>Unit</label>
        <select id="f-unit">
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="L">L</option>
          <option value="units">units</option>
          <option value="boxes">boxes</option>
          <option value="crates">crates</option>
        </select>
      </div>
    </div>

    <label>Supplier</label>
    <input type="text" id="f-supplier" placeholder="e.g. Metro">

    <label>Temperature on arrival (°C)</label>
    <input type="number" id="f-temp" placeholder="e.g. 4" step="0.1">

    <div class="accepted-row">
      <span class="accepted-label">Accepted</span>
      <button class="toggle on" id="toggle-accepted" onclick="toggleAccepted()"></button>
    </div>

    <button class="btn btn-submit" id="btn-submit" onclick="submitEntry()">Log to sheet</button>
    <button class="btn btn-clear"  id="btn-clear"  onclick="clearForm()">Scan another</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpWy4UcYFdJno4ynQ70tUab-quvXs9t6SlidbT-cVcTHaTYAW2m4GHg1W8YgDoqebrsw/exec";

let acceptedState  = true;
let currentBarcode = "";
let quaggaRunning  = false;
let resultBuffer   = [];

function toggleAccepted() {
  acceptedState = !acceptedState;
  document.getElementById("toggle-accepted").classList.toggle("on", acceptedState);
}

function startScan() {
  document.getElementById("scanner-box").style.display = "block";
  document.getElementById("btn-scan").style.display    = "none";
  document.getElementById("btn-stop").style.display    = "flex";

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById("interactive"),
      constraints: {
        facingMode: "environment",
        width:  { min: 640, ideal: 1280 },
        height: { min: 480, ideal: 720 },
      },
    },
    locator: { patchSize: "medium", halfSample: true },
    numOfWorkers: 2,
    frequency: 10,
    decoder: {
      readers: [
        "ean_reader",
        "ean_8_reader",
        "upc_reader",
        "upc_e_reader",
        "code_128_reader",
        "code_39_reader",
      ],
    },
    locate: true,
  }, function(err) {
    if (err) {
      stopScan();
      showToast("Camera error: " + err.message, "error");
      return;
    }
    Quagga.start();
    quaggaRunning = true;
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    resultBuffer.push(code);
    if (resultBuffer.length > 6) resultBuffer.shift();

    const count = resultBuffer.filter(r => r === code).length;
    if (count >= 3) {
      resultBuffer = [];
      stopScan();
      onBarcodeScanned(code);
    }
  });
}

function stopScan() {
  if (quaggaRunning) {
    Quagga.offDetected();
    Quagga.stop();
    quaggaRunning = false;
  }
  resultBuffer = [];
  document.getElementById("scanner-box").style.display = "none";
  document.getElementById("btn-scan").style.display    = "flex";
  document.getElementById("btn-stop").style.display    = "none";
}

async function onBarcodeScanned(barcode) {
  currentBarcode = barcode;

  document.getElementById("barcode-display").textContent  = barcode;
  document.getElementById("barcode-sub").textContent      = "Looking up product...";
  document.getElementById("barcode-result").style.display = "block";
  document.getElementById("lookup-status").style.display  = "flex";
  document.getElementById("form-card").style.display      = "block";
  document.getElementById("btn-submit").style.display     = "flex";
  document.getElementById("btn-clear").style.display      = "flex";

  try {
    const res  = await fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json");
    const data = await res.json();

    document.getElementById("lookup-status").style.display = "none";

    if (data.status === 1 && data.product) {
      const p        = data.product;
      const name     = p.product_name || p.product_name_en || "";
      const brand    = p.brands || "";
      const category = guessCategory(p.categories_tags || []);

      document.getElementById("f-name").value     = name;
      document.getElementById("f-brand").value    = brand;
      document.getElementById("f-category").value = category;
      document.getElementById("barcode-sub").textContent = name ? "Found: " + name : "Product found — verify details";
    } else {
      document.getElementById("barcode-sub").textContent = "Not in database — fill in manually";
    }
  } catch(e) {
    document.getElementById("lookup-status").style.display = "none";
    document.getElementById("barcode-sub").textContent     = "Lookup failed — fill in manually";
  }
}

function guessCategory(tags) {
  const s = tags.join(" ").toLowerCase();
  if (s.includes("meat") || s.includes("ham") || s.includes("sausage") || s.includes("poultry") || s.includes("beef") || s.includes("pork")) return "Meat";
  if (s.includes("fish") || s.includes("seafood") || s.includes("salmon") || s.includes("tuna"))  return "Fish & Seafood";
  if (s.includes("dairy") || s.includes("cheese") || s.includes("milk") || s.includes("yogurt"))  return "Dairy";
  if (s.includes("frozen"))  return "Frozen";
  if (s.includes("vegetable") || s.includes("fruit") || s.includes("salad"))  return "Produce";
  if (s.includes("beverage") || s.includes("drink") || s.includes("juice"))   return "Beverages";
  if (s.includes("cereal") || s.includes("pasta") || s.includes("rice") || s.includes("flour"))   return "Dry goods";
  return "";
}

async function submitEntry() {
  const name   = document.getElementById("f-name").value.trim();
  const lot    = document.getElementById("f-lot").value.trim();
  const expiry = document.getElementById("f-expiry").value;

  if (!name)   { showToast("Product name is required", "error"); return; }
  if (!lot)    { showToast("Lot number is required", "error");   return; }
  if (!expiry) { showToast("Expiry date is required", "error");  return; }

  const btn = document.getElementById("btn-submit");
  btn.textContent = "Saving...";
  btn.disabled    = true;

  const payload = {
    productName : name,
    brand       : document.getElementById("f-brand").value.trim(),
    barcode     : currentBarcode,
    category    : document.getElementById("f-category").value,
    lot         : lot,
    expiry      : expiry,
    quantity    : document.getElementById("f-qty").value,
    unit        : document.getElementById("f-unit").value,
    supplier    : document.getElementById("f-supplier").value.trim(),
    temp        : document.getElementById("f-temp").value,
    accepted    : acceptedState ? "Yes" : "No",
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method  : "POST",
      mode    : "no-cors",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify(payload),
    });

    showToast("Logged to sheet!", "success");
    setTimeout(clearForm, 1500);

  } catch(e) {
    showToast("Failed to save: " + e.message, "error");
    btn.textContent = "Log to sheet";
    btn.disabled    = false;
  }
}

function clearForm() {
  currentBarcode = "";
  acceptedState  = true;

  ["barcode-result","lookup-status","form-card"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });

  document.getElementById("btn-submit").style.display = "none";
  document.getElementById("btn-clear").style.display  = "none";
  document.getElementById("btn-scan").style.display   = "flex";
  document.getElementById("toggle-accepted").classList.add("on");

  ["f-name","f-brand","f-lot","f-expiry","f-qty","f-supplier","f-temp"].forEach(id => {
    document.getElementById(id).value = "";
  });

  document.getElementById("f-category").value = "";
  document.getElementById("f-unit").value      = "kg";

  const btn = document.getElementById("btn-submit");
  btn.textContent = "Log to sheet";
  btn.disabled    = false;
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast " + (type || "");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
